<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SquidRun Task Audit</title>
  <link rel="stylesheet" href="styles/live-task-audit-sidecar.css">
</head>
<body>
  <main class="task-audit-shell">
    <header class="task-audit-header">
      <div class="task-audit-title-block">
        <p class="task-audit-eyebrow">SquidRun Task Audit</p>
        <h1>Task Audit</h1>
        <p class="task-audit-subtitle">What needs doing now, and what can wait for audit or cleanup.</p>
      </div>
      <div class="task-audit-meta-grid" aria-label="Snapshot metadata">
        <span class="task-audit-state" id="taskAuditHealth" data-tone="neutral">Loading</span>
        <span id="taskAuditSession">Session -</span>
        <span id="taskAuditUpdated">Not loaded</span>
        <button id="taskAuditRefresh" type="button">Refresh</button>
      </div>
    </header>

    <nav class="task-audit-layouts" id="taskAuditLayouts" aria-label="Task audit layout options"></nav>

    <nav class="task-audit-tabs" aria-label="Task audit views">
      <button class="task-audit-tab active" type="button" data-tab="active">
        Needs Doing <span id="activeCount">0</span>
      </button>
      <button class="task-audit-tab" type="button" data-tab="future">
        Audit / Cleanup Later <span id="futureCount">0</span>
      </button>
      <button class="task-audit-tab" type="button" data-tab="history">
        History <span id="historyCount">0</span>
      </button>
    </nav>

    <section class="task-audit-stage" id="taskAuditStage" aria-live="polite"></section>
  </main>
  <script src="live-task-audit-sidecar-renderer.js"></script>
</body>
</html>
