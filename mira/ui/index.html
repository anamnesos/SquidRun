<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mira</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="conversation" aria-label="Mira conversation">
        <header class="topbar">
          <div>
            <p class="kicker">Mira Runtime</p>
            <h1>Mira</h1>
          </div>
          <div class="status-strip" id="statusStrip">
            <span class="chip">loading</span>
          </div>
        </header>

        <div class="thread" id="thread" aria-live="polite">
          <article class="message mira">
            <p>I'm here. Give me the business mess in plain English.</p>
          </article>
        </div>

        <form class="composer" id="turnForm">
          <label class="model-toggle">
            <input type="checkbox" id="useModel" checked>
            <span>model</span>
          </label>
          <textarea id="turnText" rows="3" placeholder="Type to Mira..." autocomplete="off"></textarea>
          <button type="submit" id="sendButton">Send</button>
        </form>
      </section>

      <aside class="side" aria-label="Runtime context">
        <h2>Context</h2>
        <dl>
          <div>
            <dt>Operator</dt>
            <dd id="operatorSummary">loading</dd>
          </div>
          <div>
            <dt>Core</dt>
            <dd id="coreSummary">loading</dd>
          </div>
          <div>
            <dt>Last Turn</dt>
            <dd id="lastTurn">none</dd>
          </div>
        </dl>
      </aside>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
