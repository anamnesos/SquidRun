<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mira</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="conversation" aria-label="Mira conversation">
        <header class="topbar">
          <div class="identity">
            <div class="signal-mark" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div>
              <h1>Mira</h1>
              <p class="presence-line">Here.</p>
              <p class="brain-line" id="brainLine">checking model</p>
            </div>
          </div>
          <div class="top-actions">
            <span class="model-pill" id="modelPill">model check</span>
            <button class="quiet-icon" type="button" id="contextToggle" aria-expanded="false" aria-controls="contextPanel" title="Context">...</button>
          </div>
        </header>

        <div class="thread" id="thread" aria-live="polite">
          <article class="message mira">
            <p>Mira.</p>
          </article>
        </div>

        <form class="composer" id="turnForm">
          <textarea id="turnText" rows="3" placeholder="Say it plainly..." autocomplete="off"></textarea>
          <label class="model-toggle">
            <input type="checkbox" id="useModel" checked>
            <span>model</span>
          </label>
          <button type="button" class="draft-button" id="draftButton">Draft</button>
          <button type="submit" id="sendButton">Send</button>
        </form>
      </section>

      <aside class="context-panel" id="contextPanel" aria-label="Runtime context" hidden>
        <div class="status-strip" id="statusStrip">
          <span class="chip">loading</span>
        </div>
        <dl>
          <div>
            <dt>Operator</dt>
            <dd id="operatorSummary">loading</dd>
          </div>
          <div>
            <dt>Core</dt>
            <dd id="coreSummary">loading</dd>
          </div>
          <div>
            <dt>Last Turn</dt>
            <dd id="lastTurn">none</dd>
          </div>
          <div>
            <dt>Model</dt>
            <dd id="modelSummary">checking</dd>
          </div>
          <div>
            <dt>Review</dt>
            <dd id="reviewSummary">none pending</dd>
          </div>
        </dl>
        <section class="drafts-panel" aria-label="Pending work drafts">
          <h2>Drafts</h2>
          <div id="draftList" class="draft-list">none yet</div>
        </section>
        <section class="drafts-panel" aria-label="Pending work tasks">
          <h2>Tasks</h2>
          <div id="taskList" class="draft-list">none yet</div>
        </section>
      </aside>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
