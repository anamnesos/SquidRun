<!DOCTYPE html>
<html><head><meta charset='UTF-8'><style>
body{font-family:'맑은 고딕',sans-serif;margin:20px;background:#fff;}

.box{border:2px solid #2d8659;border-radius:10px;padding:15px 20px;text-align:center;background:#f0f7f4;min-width:120px;}

.arrow{font-size:24pt;color:#2d8659;}
.title{text-align:center;font-size:16pt;font-weight:bold;color:#2d8659;margin-bottom:5px;}
.subtitle{text-align:center;font-size:10pt;color:#666;margin-bottom:20px;}
.bottom{display:flex;justify-content:center;gap:30px;margin-top:20px;}
.tag{background:#2d8659;color:#fff;padding:5px 15px;border-radius:20px;font-size:9pt;}
</style></head><body>
<div class='title'>NurseCura 서비스 흐름도</div>

<div class='box'><h3>5단계</h3><p>전문가 콘텐츠<br>(유튜브/인스타)</p></div>
</div>
<div class='bottom'>

</body></html>
