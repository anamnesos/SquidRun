    - heading "Frequently asked Questions" [level=5]
    - text: Last updated
    - time: 04/23/26 03:12 AM
    - img
    - heading "What is Token Unlock?" [level=5]
    - text: Token unlock is an event where previously locked tokens are released into circulation based on a predetermined schedule. This token release increases the available supply and may influence market behavior. Unlock events typically follow cliff or linear vesting structures and are closely tracked due to their potential impact on token price and liquidity.
    - img
    - heading "What is the meaning of Tokenomics?" [level=5]
    - text: Tokenomics refers to the economic model governing a cryptocurrency. It includes token creation, distribution strategy, supply control, inflation rate, token utility, and incentives. Good tokenomics ensures sustainable value, defines monetary policy, and impacts how tokens circulate, are used, and retained in a blockchain ecosystem.
    - img
    - heading "What is vesting in crypto?" [level=5]
    - text: Vesting in crypto is a time-based process that gradually releases tokens to recipients like team members or investors. A token release schedule, often using cliff or linear vesting, controls the pace of distribution to avoid flooding the market. Crypto vesting aligns stakeholders with long-term goals and stabilizes token price over time.
    - img
    - heading "What is an allocation?" [level=5]
    - text: Token allocation is how a cryptocurrency project divides its total token supply among stakeholders such as the founding team, investors, community, reserves, and the ecosystem. Each allocation follows a distribution model and strategy that supports token stability, project growth, and equitable ownership.
    - img
    - heading "What is vesting in Tokenomics?" [level=5]
    - text: In tokenomics, vesting is a structured release mechanism that governs when and how allocated tokens become available. Common vesting structures include cliffs (one-time release) and linear schedules (gradual unlock). It prevents rapid sell-offs, manages circulating supply, and sustains long-term project development.
    - img
    - heading "Is token unlock bullish or bearish?" [level=5]
    - text: A token unlocks can be bullish or bearish depending on context. A large unlock may create selling pressure and be bearish. However, if tokens go to long-term partners or for ecosystem use, it could be bullish. These events are considered liquidity events and should be evaluated in relation to tokenomics, market timing, and project strategy.
    - img
    - heading "What is a vesting schedule for tokens?" [level=5]
    - text: "A vesting schedule outlines how tokens are released over time. There are typically two types: cliff vesting (all at once after a period) and linear vesting (gradual release). The schedule defines vesting periods and unlock mechanisms to ensure controlled and predictable token distribution, aligning incentives."
    - img
    - heading "Why is token lock-up necessary?" [level=5]
    - text: Token lock-ups serve as anti-dump strategies to prevent early investors or team members from selling large volumes immediately. This creates market protection, ensures price stability, and builds investor trust. Lock-ups are key to phased distribution, aligned incentives, and managing circulating supply responsibly.
    - img
    - heading "What happens when a token is locked?" [level=5]
    - text: Token lock-ups serve as anti-dump strategies to prevent early investors or team members from selling large volumes immediately. This creates market protection, ensures price stability, and builds investor trust. Lock-ups are key to phased distribution, aligned incentives, and managing circulating supply responsibly.
    - img
    - heading "What happens after token unlocks?" [level=5]
    - text: After a token unlocks, it becomes part of the circulating supply and can be traded or transferred. This increases token mobility and liquidity. However, not all unlocked tokens are immediately sold—holder decisions and market context influence actual supply impact and potential price movement.
