            - generic [ref=e1308]:
              - generic [ref=e1309] [cursor=pointer]:
                - generic [ref=e1310]:
                  - img [ref=e1311]
                  - heading "What is Token Unlock?" [level=5] [ref=e1313]
                - generic: Token unlock is an event where previously locked tokens are released into circulation based on a predetermined schedule. This token release increases the available supply and may influence market behavior. Unlock events typically follow cliff or linear vesting structures and are closely tracked due to their potential impact on token price and liquidity.
              - generic [ref=e1315] [cursor=pointer]:
                - generic [ref=e1316]:
                  - img [ref=e1317]
                  - heading "What is the meaning of Tokenomics?" [level=5] [ref=e1319]
                - generic: Tokenomics refers to the economic model governing a cryptocurrency. It includes token creation, distribution strategy, supply control, inflation rate, token utility, and incentives. Good tokenomics ensures sustainable value, defines monetary policy, and impacts how tokens circulate, are used, and retained in a blockchain ecosystem.
              - generic [ref=e1321] [cursor=pointer]:
                - generic [ref=e1322]:
                  - img [ref=e1323]
                  - heading "What is vesting in crypto?" [level=5] [ref=e1325]
                - generic: Vesting in crypto is a time-based process that gradually releases tokens to recipients like team members or investors. A token release schedule, often using cliff or linear vesting, controls the pace of distribution to avoid flooding the market. Crypto vesting aligns stakeholders with long-term goals and stabilizes token price over time.
              - generic [ref=e1327] [cursor=pointer]:
                - generic [ref=e1328]:
                  - img [ref=e1329]
                  - heading "What is an allocation?" [level=5] [ref=e1331]
                - generic: Token allocation is how a cryptocurrency project divides its total token supply among stakeholders such as the founding team, investors, community, reserves, and the ecosystem. Each allocation follows a distribution model and strategy that supports token stability, project growth, and equitable ownership.
              - generic [ref=e1333] [cursor=pointer]:
                - generic [ref=e1334]:
                  - img [ref=e1335]
                  - heading "What is vesting in Tokenomics?" [level=5] [ref=e1337]
                - generic: In tokenomics, vesting is a structured release mechanism that governs when and how allocated tokens become available. Common vesting structures include cliffs (one-time release) and linear schedules (gradual unlock). It prevents rapid sell-offs, manages circulating supply, and sustains long-term project development.
            - generic [ref=e1338]:
              - generic [ref=e1339] [cursor=pointer]:
                - generic [ref=e1340]:
                  - img [ref=e1341]
                  - heading "Is token unlock bullish or bearish?" [level=5] [ref=e1343]
                - generic: A token unlocks can be bullish or bearish depending on context. A large unlock may create selling pressure and be bearish. However, if tokens go to long-term partners or for ecosystem use, it could be bullish. These events are considered liquidity events and should be evaluated in relation to tokenomics, market timing, and project strategy.
              - generic [ref=e1345] [cursor=pointer]:
                - generic [ref=e1346]:
                  - img [ref=e1347]
                  - heading "What is a vesting schedule for tokens?" [level=5] [ref=e1349]
                - generic: "A vesting schedule outlines how tokens are released over time. There are typically two types: cliff vesting (all at once after a period) and linear vesting (gradual release). The schedule defines vesting periods and unlock mechanisms to ensure controlled and predictable token distribution, aligning incentives."
              - generic [ref=e1351] [cursor=pointer]:
                - generic [ref=e1352]:
                  - img [ref=e1353]
                  - heading "Why is token lock-up necessary?" [level=5] [ref=e1355]
                - generic: Token lock-ups serve as anti-dump strategies to prevent early investors or team members from selling large volumes immediately. This creates market protection, ensures price stability, and builds investor trust. Lock-ups are key to phased distribution, aligned incentives, and managing circulating supply responsibly.
              - generic [ref=e1357] [cursor=pointer]:
                - generic [ref=e1358]:
                  - img [ref=e1359]
                  - heading "What happens when a token is locked?" [level=5] [ref=e1361]
                - generic: Token lock-ups serve as anti-dump strategies to prevent early investors or team members from selling large volumes immediately. This creates market protection, ensures price stability, and builds investor trust. Lock-ups are key to phased distribution, aligned incentives, and managing circulating supply responsibly.
              - generic [ref=e1363] [cursor=pointer]:
                - generic [ref=e1364]:
                  - img [ref=e1365]
                  - heading "What happens after token unlocks?" [level=5] [ref=e1367]
                - generic: After a token unlocks, it becomes part of the circulating supply and can be traded or transferred. This increases token mobility and liquidity. However, not all unlocked tokens are immediately sold—holder decisions and market context influence actual supply impact and potential price movement.
